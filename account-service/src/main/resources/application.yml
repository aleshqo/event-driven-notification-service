server:
  port: 8080

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://postgres:5432/account_db
    username: banking_user
    password: banking_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
